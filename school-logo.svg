<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1f5e"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="59" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="55" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="51" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Decorative top arc stars -->
  <text x="22" y="32" fill="#FCD34D" font-size="9" font-family="Arial">★</text>
  <text x="50" y="17" fill="#FCD34D" font-size="9" font-family="Arial">★</text>
  <text x="80" y="17" fill="#FCD34D" font-size="9" font-family="Arial">★</text>
  <text x="90" y="32" fill="#FCD34D" font-size="9" font-family="Arial">★</text>

  <!-- Shield / book shape -->
  <path d="M45 34 L45 60 Q45 68 60 72 Q75 68 75 60 L75 34 Z" fill="url(#shield)" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
  <!-- Book lines -->
  <line x1="51" y1="43" x2="69" y2="43" stroke="rgba(255,255,255,0.7)" stroke-width="1.3"/>
  <line x1="51" y1="49" x2="69" y2="49" stroke="rgba(255,255,255,0.7)" stroke-width="1.3"/>
  <line x1="51" y1="55" x2="69" y2="55" stroke="rgba(255,255,255,0.7)" stroke-width="1.3"/>
  <!-- Center spine -->
  <line x1="60" y1="34" x2="60" y2="70" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>

  <!-- THPT label -->
  <text x="60" y="88" text-anchor="middle" fill="white" font-size="11.5" font-weight="700" font-family="Arial, sans-serif" letter-spacing="3">NHC</text>
  <text x="60" y="98" text-anchor="middle" fill="#93C5FD" font-size="6.2" font-family="Arial, sans-serif" letter-spacing="0.5">NGUYỄN HỮU CẢNH</text>
  <text x="60" y="107" text-anchor="middle" fill="#93C5FD" font-size="5.8" font-family="Arial, sans-serif">ĐỒNG NAI · 1998</text>

  <!-- Bottom decorative line -->
  <line x1="30" y1="103" x2="90" y2="103" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
</svg>
