<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mượn / Trả — Thư viện NHC</title>
  <link rel="icon" href="unnamed.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>

<div class="app-wrap">
  <div id="sidebar-cnt"></div>
  <div class="main-area">
    <div id="topbar-cnt"></div>
    <main class="main-content" id="content"></main>
  </div>
</div>

<script src="script.js"></script>
<script>
// Khởi tạo trang và kiểm tra quyền
initPage('borrow', ['librarian', 'student', 'học sinh']);

const U = getCurrentUser(); 
const isLib = (U && U.role === 'librarian');

// --- SỬA LỖI: Nếu có sách đợi mượn từ trang Books, luôn mở tab 'new' ---
const quickBook = sessionStorage.getItem('quick_borrow_book');
let tabActive = (isLib || quickBook) ? 'new' : 'my'; 

if (quickBook) { sessionStorage.removeItem('quick_borrow_book'); }

let searchQ   = '';
let selUser   = null;     
let statusFlt = 'active'; 

function render() {
  const borrows = getBorrows();
  const books   = getBooks();
  const users   = getUsers();

  const active   = borrows.filter(r=>r.status==='borrowed').length;
  const overdue  = borrows.filter(r=>r.status==='overdue').length;

  // --- SỬA LỖI: Thêm tab "Mượn sách" cho cả Học sinh ---
  let tabsHtml = `
    <div class="tab-bar">
      <button class="tab-btn${tabActive==='new'?' active':''}" onclick="setTab('new')">➕ Mượn sách mới</button>
      <button class="tab-btn${tabActive==='my' || tabActive==='list'?' active':''}" 
              onclick="setTab('${isLib?'list':'my'}')">${isLib?'📋 Đang mượn':'📖 Sách đang mượn'}</button>
      <button class="tab-btn${tabActive==='history'?' active':''}" onclick="setTab('history')">📜 Lịch sử</button>
    </div>`;

  let bodyHtml = '';
  
  // TAB LẬP PHIẾU (Dùng chung cho cả Thủ thư và Học sinh)
  if (tabActive === 'new') {
    const availBooks = books.filter(b => b.avail > 0);
    bodyHtml = `
    <div class="card" style="max-width:520px">
      <div class="card-hd">📝 Lập phiếu mượn sách</div>
      <form class="frm" onsubmit="handleBorrow(event)">
        <div class="field">
          <label>Sách mượn <span class="req">*</span></label>
          <select id="br-book" required>
            <option value="">-- Chọn sách muốn mượn --</option>
            ${availBooks.map(b => `<option value="${b.id}" ${quickBook === b.id ? 'selected' : ''}>${esc(b.title)} (${esc(b.author)}) — Còn: ${b.avail}</option>`).join('')}
          </select>
        </div>
        
        <div class="field">
          <label>Người mượn</label>
          ${isLib ? `
            <div class="usearch-wrap">
              <div class="iw"><span class="ii">👤</span>
                <input type="text" id="uSearch" placeholder="Tìm tên hoặc số hiệu..." autocomplete="off" oninput="onUserSearch(this.value)">
              </div>
              <div id="uDrop" class="usearch-drop"></div>
              <div id="selUserBox"></div>
              <input type="hidden" id="br-user">
            </div>
          ` : `
            <div class="sel-user-card" style="background:#F3F4F6">
              <div class="avatar avatar-sm" style="background:var(--p-primary);color:white">${U.name.charAt(0)}</div>
              <div style="flex:1"><b>${esc(U.name)}</b> <br> <small>Số hiệu: ${esc(U.studentId)}</small></div>
              <input type="hidden" id="br-user" value="${U.id}">
            </div>
          `}
        </div>

        <div class="frm-row">
          <div class="field"><label>Ngày mượn</label><input type="date" id="br-date" value="${todayStr()}" ${!isLib?'readonly':''}></div>
          <div class="field"><label>Hạn trả</label><input type="date" id="br-due" value="${defDue()}"></div>
        </div>
        <div class="field"><label>Ghi chú</label><input type="text" id="br-note" placeholder="Mượn về nhà / Tại chỗ..."></div>
        <button type="submit" class="btn btn-primary btn-full">✅ Xác nhận mượn</button>
      </form>
    </div>`;
  } 
  else if (tabActive === 'list' && isLib) {
    let list = borrows.filter(r => r.status === 'borrowed' || r.status === 'overdue');
    if (searchQ) {
      const sq = searchQ.toLowerCase();
      list = list.filter(r => {
        const b = books.find(x => x.id === r.bookId);
        const u = users.find(x => x.id === r.userId);
        return (b?.title||'').toLowerCase().includes(sq) || (u?.name||'').toLowerCase().includes(sq) || (u?.studentId||'').includes(sq);
      });
    }
    bodyHtml = `<div class="toolbar"><div class="sbox"><input type="text" placeholder="Tìm sách, người mượn..." oninput="searchQ=this.value;render()"></div></div>` + borrowTableHtml(list, books, users, true);
  } 
  else if (tabActive === 'my') {
    let list = borrows.filter(r => r.userId === U.id && (r.status === 'borrowed' || r.status === 'overdue'));
    bodyHtml = borrowTableHtml(list, books, users, false);
  } 
  else if (tabActive === 'history') {
    const myId = isLib ? null : U.id;
    let list = borrows.filter(r => r.status === 'returned' && (isLib || r.userId === myId));
    bodyHtml = borrowTableHtml(list, books, users, false);
  }

  document.getElementById('content').innerHTML = `
  <div class="page">
    <div class="page-hd"><h1>🔄 Mượn / Trả sách</h1></div>
    ${tabsHtml}
    ${bodyHtml}
  </div>`;

  if (tabActive === 'new' && isLib) renderSelUser();
}

function borrowTableHtml(list, books, users, canReturn) {
  if (list.length === 0) return '<div class="empty-state">📋 Không có dữ liệu</div>';
  return `<div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Sách</th><th>Người mượn</th><th>Ngày mượn</th><th>Hạn trả</th>${!canReturn?'<th>Ngày trả</th>':''}<th>Trạng thái</th>${canReturn?'<th>Thao tác</th>':''}</tr></thead>
    <tbody>
    ${list.map(r => {
      const b = books.find(x => x.id === r.bookId);
      const u = users.find(x => x.id === r.userId);
      return `<tr>
        <td><b>${esc(b?.title||'---')}</b></td>
        <td><b>${esc(u?.name||'N/A')}</b><br><small>Số hiệu: ${esc(u?.studentId||'')}</small></td>
        <td>${fmtD(r.borrowDate)}</td>
        <td>${fmtD(r.dueDate)}</td>
        ${!canReturn ? `<td>${fmtD(r.returnDate)}</td>` : ''}
        <td>${statusBadge(r.status)}</td>
        ${canReturn ? `<td><button class="btn btn-sm btn-success" onclick="returnBook('${r.id}')">✅ Trả sách</button></td>` : ''}
      </tr>`;
    }).join('')}
    </tbody></table></div>`;
}

// Logic xử lý
function setTab(t) { tabActive = t; selUser = null; render(); }

function onUserSearch(v) {
  const drop = document.getElementById('uDrop');
  if (v.length < 1) { drop.style.display = 'none'; return; }
  const filtered = getUsers().filter(u => u.role !== 'librarian' && (u.name.toLowerCase().includes(v.toLowerCase()) || u.studentId.includes(v)));
  drop.innerHTML = filtered.map(u => `<div class="drop-item" onclick="selectUser('${u.id}')"><b>${esc(u.name)}</b> (${u.studentId})</div>`).join('');
  drop.style.display = 'block';
}

function selectUser(id) {
  selUser = getUsers().find(x => x.id === id);
  document.getElementById('uDrop').style.display = 'none';
  renderSelUser();
}

function renderSelUser() {
  const box = document.getElementById('selUserBox'), hid = document.getElementById('br-user');
  if (!selUser) { box.innerHTML = ''; hid.value = ''; return; }
  hid.value = selUser.id;
  box.innerHTML = `<div class="sel-user-card"><b>${esc(selUser.name)}</b> (${selUser.studentId}) <span onclick="selUser=null;renderSelUser()">✕</span></div>`;
}

function handleBorrow(e) {
  e.preventDefault();
  const bid = document.getElementById('br-book').value;
  const uid = document.getElementById('br-user').value;
  if (!bid || !uid) { toast('Vui lòng chọn đầy đủ thông tin','error'); return; }

  const borrows = getBorrows(), books = getBooks();
  const b = books.find(x => x.id === bid);
  const u = getUsers().find(x => x.id === uid);

  const r = { id:'r'+Date.now(), bookId:bid, userId:uid, borrowDate:document.getElementById('br-date').value, dueDate:document.getElementById('br-due').value, returnDate:'', status:'borrowed', note:document.getElementById('br-note').value };
  
  borrows.push(r);
  if (b) b.avail--;
  saveBorrows(borrows);
  saveBooks(books);

  // Gửi Google Sheets
  gsPost(GS.BORROW, { action:'BORROW', bookTitle:b.title, borrowerName:u.name, borrowerCode:u.studentId, borrowDate:r.borrowDate, processedBy:U.name });
  toast('✅ Đã đăng ký mượn sách thành công!', 'success');
  setTab(isLib ? 'list' : 'my');
}

function returnBook(rid) {
  const borrows = getBorrows(), books = getBooks();
  const r = borrows.find(x => x.id === rid);
  if (!r || !confirm('Xác nhận trả sách?')) return;
  const b = books.find(x => x.id === r.bookId);
  r.status = 'returned'; r.returnDate = todayStr();
  if (b) b.avail = Math.min(b.qty, b.avail + 1);
  saveBorrows(borrows); saveBooks(books);
  gsPost(GS.BORROW, { action:'RETURN', bookTitle:b?.title, returnDate:r.returnDate });
  render();
}

render();
</script>
</body>
</html>
