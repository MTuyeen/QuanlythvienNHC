<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NgЖ°б»ќi dГ№ng вЂ” ThЖ° viб»‡n NHC</title>
  <link rel="icon" href="school-logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>

<div class="app-wrap">
  <div id="sidebar-cnt"></div>
  <div class="main-area">
    <div id="topbar-cnt"></div>
    <main class="main-content" id="content"></main>
  </div>
</div>

<script src="script.js"></script>
<script>
initPage('users', ['librarian']);
const U = getCurrentUser();

let tabActive  = 'pending';
let searchQ    = '';
let showAddUser = false;

function render() {
  const users = getUsers();
  const pending  = users.filter(u=>u.status==='pending');
  const approved = users.filter(u=>u.status==='approved');
  const rejected = users.filter(u=>u.status==='rejected');

  const q = searchQ.toLowerCase();
  const tabMap = { all:users, pending, approved, rejected };
  let list = tabMap[tabActive]||users;
  if (q) list = list.filter(u=>
    u.name.toLowerCase().includes(q)||
    (u.username||'').toLowerCase().includes(q)||
    (u.studentId||'').toLowerCase().includes(q)||
    (u.email||'').toLowerCase().includes(q)
  );

  document.getElementById('content').innerHTML = `
<div class="page">
  <div class="page-hd">
    <h1>рџ‘Ґ QuбєЈn lГЅ ngЖ°б»ќi dГ№ng</h1>
    <p>${users.length} tГ i khoбєЈn trong hб»‡ thб»‘ng В· ${pending.length} chб»ќ phГЄ duyб»‡t</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon" style="background:#D1FAE5">вњ…</div><div><p class="stat-label">ДђГЈ duyб»‡t</p><p class="stat-val" style="color:#059669">${approved.length}</p></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7">вЏі</div><div><p class="stat-label">Chб»ќ duyб»‡t</p><p class="stat-val" style="color:#D97706">${pending.length}</p></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#FEE2E2">вќЊ</div><div><p class="stat-label">Tб»« chб»‘i</p><p class="stat-val" style="color:#DC2626">${rejected.length}</p></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#EDE9FE">рџ‘¤</div><div><p class="stat-label">Tб»•ng cб»™ng</p><p class="stat-val" style="color:#7C3AED">${users.length}</p></div></div>
  </div>

  ${pending.length>0?`
  <div class="card" style="border-left:4px solid #D97706">
    <div class="card-hd">вЏі ${pending.length} tГ i khoбєЈn Д‘ang chб»ќ phГЄ duyб»‡t
      <div class="card-hd-actions">
        <button class="btn btn-sm btn-success" onclick="approveAll()">вњ… Duyб»‡t tбєҐt cбєЈ</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${pending.map(u=>pendingCard(u)).join('')}
    </div>
  </div>`:''}

  <div class="tab-bar">
    <button class="tab-btn${tabActive==='all'?' active':''}" onclick="setTab('all')">TбєҐt cбєЈ <span class="tab-count">${users.length}</span></button>
    <button class="tab-btn${tabActive==='pending'?' active':''}" onclick="setTab('pending')">Chб»ќ duyб»‡t <span class="tab-count">${pending.length}</span></button>
    <button class="tab-btn${tabActive==='approved'?' active':''}" onclick="setTab('approved')">ДђГЈ duyб»‡t <span class="tab-count">${approved.length}</span></button>
    <button class="tab-btn${tabActive==='rejected'?' active':''}" onclick="setTab('rejected')">Tб»« chб»‘i <span class="tab-count">${rejected.length}</span></button>
  </div>

  <div class="toolbar">
    <div class="sbox">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="TГ¬m tГЄn, username, mГЈ sб»‘, email..." value="${esc(searchQ)}" oninput="searchQ=this.value;render()">
    </div>
    <button class="btn btn-primary" onclick="toggleAddUser()">${showAddUser?'вњ• ДђГіng':'вћ• ThГЄm ngЖ°б»ќi dГ№ng'}</button>
  </div>

  ${showAddUser ? addUserFormHtml() : ''}

  <div class="tbl-wrap">
    <table class="tbl">
      <thead><tr>
        <th>NgЖ°б»ќi dГ№ng</th><th>Username</th><th>Lб»›p / MГЈ sб»‘</th><th>Vai trГІ</th><th>TrбєЎng thГЎi</th><th>NgГ y ДђK</th><th>Thao tГЎc</th>
      </tr></thead>
      <tbody>
        ${list.length===0?`<tr><td colspan="7" class="empty">KhГґng cГі ngЖ°б»ќi dГ№ng nГ o</td></tr>`:list.map(u=>userRowHtml(u)).join('')}
      </tbody>
    </table>
  </div>
</div>`;
}

function pendingCard(u) {
  const rc = ROLE_COLOR[u.role]||{bg:'#F3F4F6',c:'#374151'};
  return `
<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid #FDE68A;border-radius:10px;background:#FFFBEB">
  <div class="avatar avatar-md" style="background:${rc.bg};color:${rc.c}">${u.name.charAt(0)}</div>
  <div style="flex:1">
    <p style="font-weight:600;font-size:13px">${esc(u.name)} <span class="code">${esc(u.username)}</span></p>
    <p style="font-size:11px;color:#6B7280">${ROLE_LABEL[u.role]||u.role}${u.className?' В· Lб»›p '+u.className:''}${u.studentId?' В· '+u.studentId:''} В· ДђДѓng kГЅ: ${fmtD(u.createdDate)}</p>
  </div>
  <div style="display:flex;gap:6px">
    <button class="btn btn-sm btn-success" onclick="approve('${u.id}')">вњ… Duyб»‡t</button>
    <button class="btn btn-sm btn-danger"  onclick="reject('${u.id}')">вќЊ Tб»« chб»‘i</button>
  </div>
</div>`;
}

function userRowHtml(u) {
  const rc = ROLE_COLOR[u.role]||{bg:'#F3F4F6',c:'#374151'};
  const isSelf = u.id === U.id;
  return `<tr>
    <td><div class="u-cell">
      <div class="avatar avatar-md" style="background:${rc.bg};color:${rc.c}">${u.name.charAt(0)}</div>
      <div><p class="fw">${esc(u.name)}${isSelf?' <span style="font-size:10px;color:#1E40AF;background:#DBEAFE;padding:1px 5px;border-radius:4px">BбєЎn</span>':''}</p>
      <small style="color:#9CA3AF">${esc(u.email||'вЂ”')}</small></div>
    </div></td>
    <td><code class="code">${esc(u.username)}</code></td>
    <td>${u.className?`<span>${esc(u.className)}</span> В· `:''}<span style="color:#6B7280">${esc(u.studentId||'вЂ”')}</span></td>
    <td>${roleTag(u.role)}</td>
    <td>${userStatusBadge(u.status)}</td>
    <td style="color:#9CA3AF;font-size:12px">${fmtD(u.createdDate)}</td>
    <td><div class="act">
      ${!isSelf && u.status!=='approved' ? `<button class="btn btn-sm btn-success" onclick="approve('${u.id}')">вњ… Duyб»‡t</button>` : ''}
      ${!isSelf && u.status!=='rejected' ? `<button class="btn btn-sm btn-danger"  onclick="reject('${u.id}')">вќЊ Tб»« chб»‘i</button>` : ''}
      ${!isSelf ? `<button class="btn btn-sm" style="background:#F3F4F6;color:#374151" onclick="resetPwd('${u.id}')">рџ”‘ Reset MK</button>` : ''}
      
      ${!isSelf ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}', '${esc(u.username)}')">рџ—‘пёЏ XГіa</button>` : ''}
    </div></td>
  </tr>`;
}

function addUserFormHtml() {
  return `
<div class="card" style="max-width:580px">
  <div class="card-hd">вћ• ThГЄm ngЖ°б»ќi dГ№ng mб»›i</div>
  <form class="frm" onsubmit="handleAddUser(event)">
    <div class="frm-row">
      <div class="field"><label>TГЄn Д‘Дѓng nhбє­p <span class="req">*</span></label><input type="text" id="au-user" placeholder="VD: NguyenVanA" required></div>
      <div class="field"><label>Hб»Ќ vГ  tГЄn <span class="req">*</span></label><input type="text" id="au-name" placeholder="Nguyб»…n VДѓn A" required></div>
    </div>
    <div class="field"><label>Vai trГІ <span class="req">*</span></label>
      <select id="au-role">
        <option value="student">рџЋ“ Hб»Ќc sinh</option>
        <option value="teacher">рџ‘ЁвЂЌрџЏ« GiГЎo viГЄn</option>
        <option value="librarian">рџ“љ Thб»§ thЖ°</option>
      </select>
    </div>
    <div class="frm-row">
      <div class="field"><label>Lб»›p</label><input type="text" id="au-class" placeholder="VD: 12A1"></div>
      <div class="field"><label>Sб»‘ hiб»‡u</label><input type="text" id="au-id" placeholder="VD: HS12345"></div>
    </div>
    <div class="field"><label>Email</label><input type="email" id="au-email" placeholder="email@nhc.edu.vn"></div>
    <div class="field"><label>Mбє­t khбє©u <span class="req">*</span></label><input type="password" id="au-pwd" placeholder="Mбє­t khбє©u mбє·c Д‘б»‹nh" required></div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary">рџ’ѕ TбєЎo tГ i khoбєЈn</button>
      <button type="button" class="btn btn-ghost" onclick="toggleAddUser()">Hб»§y</button>
    </div>
  </form>
</div>`;
}

function setTab(t) { tabActive=t; searchQ=''; render(); }
function toggleAddUser() { showAddUser=!showAddUser; render(); }

function approve(id) {
  const users = getUsers();
  const u = users.find(x=>x.id===id);
  if (!u) return;
  u.status = 'approved';
  saveUsers(users);
  gsPost(GS.USER, { action:'APPROVE', username:u.username, name:u.name, approvedBy:U.name, approvedDate:todayStr() });
  toast(`вњ… ДђГЈ duyб»‡t tГ i khoбєЈn: ${u.name}`, 'success');
  render();
}

function reject(id) {
  const users = getUsers();
  const u = users.find(x=>x.id===id);
  if (!u) return;
  if (!confirm(`Tб»« chб»‘i tГ i khoбєЈn "${u.name}" (${u.username})?`)) return;
  u.status = 'rejected';
  saveUsers(users);
  gsPost(GS.USER, { action:'REJECT', username:u.username, name:u.name, rejectedBy:U.name, rejectedDate:todayStr() });
  toast(`ДђГЈ tб»« chб»‘i: ${u.name}`, 'warning');
  render();
}

function approveAll() {
  const users = getUsers();
  const pend = users.filter(u=>u.status==='pending');
  if (!pend.length) return;
  if (!confirm(`Duyб»‡t tбєҐt cбєЈ ${pend.length} tГ i khoбєЈn Д‘ang chб»ќ?`)) return;
  pend.forEach(u=>{ u.status='approved'; });
  saveUsers(users);
  gsPost(GS.USER, { action:'APPROVE_ALL', count:pend.length, approvedBy:U.name, approvedDate:todayStr() });
  toast(`вњ… ДђГЈ duyб»‡t ${pend.length} tГ i khoбєЈn`, 'success');
  render();
}

function resetPwd(id) {
  const users = getUsers();
  const u = users.find(x=>x.id===id);
  if (!u) return;
  const newPwd = prompt(`Дђбє·t mбє­t khбє©u mб»›i cho "${u.name}" (${u.username}):\n(Дђб»ѓ trб»‘ng = reset vб»Ѓ tГЄn Д‘Дѓng nhбє­p)`);
  if (newPwd === null) return;
  const p = getPwds();
  p[u.username] = newPwd.trim()||u.username;
  savePwds(p);
  toast(`рџ”‘ ДђГЈ Д‘бє·t lбєЎi mбє­t khбє©u cho ${u.name}`, 'success');
}

function handleAddUser(e) {
  e.preventDefault();
  const data = {
    username:  document.getElementById('au-user').value.trim(),
    name:      document.getElementById('au-name').value.trim(),
    role:      document.getElementById('au-role').value,
    className: document.getElementById('au-class').value.trim(),
    studentId: document.getElementById('au-id').value.trim(),
    email:     document.getElementById('au-email').value.trim(),
    password:  document.getElementById('au-pwd').value,
  };
  if (!data.username||!data.name||!data.password) { toast('Vui lГІng Д‘iб»Ѓn Д‘бє§y Д‘б»§ (*)','error'); return; }
  const users = getUsers();
  if (users.some(u=>u.username.toLowerCase()===data.username.toLowerCase())) { toast('TГЄn Д‘Дѓng nhбє­p Д‘ГЈ tб»“n tбєЎi','error'); return; }
  const nu = { id:'u'+Date.now(), ...data, status:'approved', createdDate:todayStr() };
  delete nu.password;
  users.push(nu);
  saveUsers(users);
  const p = getPwds(); p[nu.username]=data.password; savePwds(p);
  gsPost(GS.USER, { action:'ADD_BY_ADMIN', username:nu.username, name:nu.name, role:ROLE_LABEL[nu.role]||nu.role, addedBy:U.name, addedDate:nu.createdDate });
  toast(`вњ… ДђГЈ tбєЎo tГ i khoбєЈn: ${nu.name}`, 'success');
  showAddUser = false;
  render();
}

render();
function deleteUser(id, username) {
  if (!confirm(`BбєЎn cГі chбєЇc chбєЇn muб»‘n vГґ hiб»‡u hГіa tГ i khoбєЈn "${username}"?`)) return;

  // 1. Cбє­p nhбє­t danh sГЎch User trong mГЎy
  const users = getUsers();
  const uIndex = users.findIndex(u => u.id === id);
  
  if (uIndex !== -1) {
    // Дђб»•i tГЄn username cЕ© Д‘б»ѓ khГґng bб»‹ trГ№ng khi ngЖ°б»ќi khГЎc Д‘Дѓng kГЅ lбєЎi
    const oldUsername = users[uIndex].username;
    users[uIndex].username = oldUsername + '_deleted_' + Date.now();
    users[uIndex].status = 'deleted'; // Ghi nhбє­n trбєЎng thГЎi Д‘ГЈ xГіa
    saveUsers(users);

    // 2. XГіa mбє­t khбє©u cб»§a username cЕ© Д‘б»ѓ giбєЈi phГіng nГі
    const pwds = getPwds();
    if (pwds[oldUsername]) {
      delete pwds[oldUsername];
      savePwds(pwds);
    }

    // 3. Gб»­i thГґng bГЎo lГЄn Google Sheets
    gsPost(GS.USER, { 
      action: 'SOFT_DELETE_USER', 
      targetId: id,
      username: oldUsername,
      deletedBy: U.name
    });

    toast(`ДђГЈ vГґ hiб»‡u hГіa tГ i khoбєЈn ${oldUsername}`, 'success');
    render();
  }
}
</script>
</body>
</html>
